databases:
  - name: placement-db
    databaseName: placement_db
    user: placement
    plan: free

services:
  - type: web
    name: placement-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: MODEL_PATH
        value: ml/model.pkl
      - key: MODEL_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "False"
